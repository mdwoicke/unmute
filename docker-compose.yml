# See NOTE comments for places to modify.
services:
  nginx:
    image: nginx:alpine
    ports:
      - "9090:80"
      - "9443:443"
    volumes:
      - ./services/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./services/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend

  frontend:
    image: unmute-frontend:latest
    build:
      context: frontend/
      dockerfile: hot-reloading.Dockerfile
    volumes:
      - ./frontend/src:/app/src
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
      - "traefik.http.routers.frontend.priority=10" # lowest priority

  backend:
    image: unmute-backend:latest
    build:
      context: ./
      target: hot-reloading
    volumes:
      - ./unmute:/app/unmute
    environment:
      - KYUTAI_STT_URL=ws://stt:8080
      - KYUTAI_TTS_URL=ws://tts:8080
      - KYUTAI_LLM_URL=http://host.docker.internal:1234
      - KYUTAI_LLM_MODEL=qwen/qwen3-4b
      - NEWSAPI_API_KEY=$NEWSAPI_API_KEY
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.backend.middlewares=strip-api"
      - "traefik.http.middlewares.strip-api.replacepathregex.regex=^/api/(.*)"
      - "traefik.http.middlewares.strip-api.replacepathregex.replacement=/$$1"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.services.backend.loadbalancer.server.port=80"
      - "traefik.http.routers.backend.priority=100" # higher priority than frontend
      - "prometheus-port=80"

  tts:
    image: moshi-server:latest
    command: ["worker", "--config", "configs/tts.toml"]
    build:
      context: services/moshi-server
      dockerfile: public.Dockerfile
    environment:
      - HUGGING_FACE_HUB_TOKEN=$HUGGING_FACE_HUB_TOKEN
    volumes:
      - ./volumes/hf-cache:/root/.cache/huggingface
      - ./volumes/cargo-registry-tts:/root/.cargo/registry
      - ./volumes/tts-target:/app/target
      - ./volumes/uv-cache:/root/.cache/uv
      - /tmp/models/:/models
      - ./volumes/tts-logs:/tmp/unmute_logs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  stt:
    image: moshi-server:latest
    command: ["worker", "--config", "configs/stt.toml"]
    build:
      context: services/moshi-server
      dockerfile: public.Dockerfile
    environment:
      - HUGGING_FACE_HUB_TOKEN=$HUGGING_FACE_HUB_TOKEN
    volumes:
      - ./volumes/hf-cache:/root/.cache/huggingface
      - ./volumes/cargo-registry-stt:/root/.cargo/registry
      - ./volumes/stt-target:/app/target
      - ./volumes/uv-cache:/root/.cache/uv
      - /tmp/models/:/models
      - ./volumes/stt-logs:/tmp/unmute_logs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # --- LiveKit Demo Services ---

  # livekit-server runs NATIVELY on the host (not in Docker) for WebRTC compatibility
  # Start it with: ./livekit-server.exe --dev --bind 0.0.0.0 --node-ip 192.168.1.221
  # livekit-server:
  #   image: livekit/livekit-server
  #   ...

  livekit-agent:
    build:
      context: livekit-agent/
    environment:
      - LIVEKIT_URL=ws://host.docker.internal:7880
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=secret
      - LM_STUDIO_URL=http://host.docker.internal:1234/v1
      - LM_STUDIO_MODEL=qwen/qwen3-4b
      - KYUTAI_STT_URL=ws://stt:8080
      - KYUTAI_TTS_URL=ws://tts:8080
    # Note: stt and tts must be running but we don't use depends_on
    # to avoid recreating them on every agent rebuild

  livekit-frontend:
    build:
      context: livekit-frontend/
    environment:
      - NEXT_PUBLIC_LIVEKIT_URL=wss://localhost:3443/livekit-ws/
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=secret

  livekit-nginx:
    image: nginx:alpine
    ports:
      - "3333:80"
      - "3443:443"
    volumes:
      - ./livekit-frontend/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./livekit-frontend/certs:/etc/nginx/certs:ro
    depends_on:
      - livekit-frontend

  # --- LiveKit MCP Demo Services ---

  livekit-agent-mcp:
    build:
      context: livekit-agent-mcp/
    environment:
      - LIVEKIT_URL=ws://host.docker.internal:7880
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=secret
      - LM_STUDIO_URL=http://host.docker.internal:1234/v1
      - LM_STUDIO_MODEL=qwen/qwen3-4b
      - KYUTAI_STT_URL=ws://stt:8080
      - KYUTAI_TTS_URL=ws://tts:8080
      - MCP_SERVER_URL=http://localhost:8000/sse
      - MCP_SPORTS_SERVER_URL=http://localhost:8001/sse
      - TTS_GAIN=1.5

  livekit-frontend-mcp:
    build:
      context: livekit-frontend-mcp/
    environment:
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=secret

  livekit-nginx-mcp:
    image: nginx:alpine
    ports:
      - "4333:80"
      - "4443:443"
    volumes:
      - ./livekit-frontend-mcp/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./livekit-frontend-mcp/certs:/etc/nginx/certs:ro
    depends_on:
      - livekit-frontend-mcp

  # --- LiveKit Builder Demo Services ---

  livekit-agent-builder:
    build:
      context: livekit-agent-builder/
    volumes:
      - D:/Applications/dynamic-skills-agent:/app/iva-source
    environment:
      - LIVEKIT_URL=ws://host.docker.internal:7880
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=secret
      - LM_STUDIO_URL=http://host.docker.internal:1234/v1
      - LM_STUDIO_MODEL=qwen/qwen3.5-9b
      - KYUTAI_STT_URL=ws://stt:8080
      - KYUTAI_TTS_URL=ws://tts:8080
      - IVA_SOURCE_PATH=/app/iva-source
      - PYTHONPATH=/app/iva-source
      - TTS_GAIN=1.5

  livekit-frontend-builder:
    build:
      context: livekit-frontend-builder/
    environment:
      - NEXT_PUBLIC_LIVEKIT_URL=wss://localhost:5443/livekit-ws/
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=secret

  livekit-nginx-builder:
    image: nginx:alpine
    ports:
      - "5333:80"
      - "5443:443"
    volumes:
      - ./livekit-frontend-builder/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./livekit-frontend-builder/certs:/etc/nginx/certs:ro
    depends_on:
      - livekit-frontend-builder

  # llm service disabled — using LM Studio on host instead (http://host.docker.internal:1234/v1)
